@if (selectedChannel) {
	<!-- Rest des Templates bleibt unverändert -->
	<section class="chat-section">
		<header class="header">
			<div *ngIf="!isNewMessage" class="chat-header-wrapper">
				<app-chat-header
					[selectedChannel]="selectedChannel"
					[otherUser$]="otherUser$"
					[otherUserPresence$]="otherUserPresence$"
					[currentUser]="currentUser"
					[screenWidth]="screenWidth"
					(openModal)="onOpenModal()"
					(openMembersMenu)="onOpenMembersMenu()"
					(openAddMemberModal)="onOpenAddMemberModal()"
					(profileCardToggle)="onProfileCardToggle($event)">
				</app-chat-header>

				<app-chat-members
					*ngIf="selectedChannel.channelType.channel"
					[selectedChannel]="selectedChannel"
					[currentUser]="currentUser"
					[screenWidth]="screenWidth"
					[isMembersMenuOpen]="isMembersMenuOpen"
					[isAddMemberModalOpen]="isAddMemberModalOpen"
					[isProfileCardOpen]="isProfileCardOpen"
					[selectedUsersToAdd]="selectedUsersToAdd"
					[filteredUsers]="filteredUsers"
					[searchText]="searchText"
					[disabledButton]="disabledButton"
					(openAddMemberModal)="onOpenAddMemberModal()"
					(closeModals)="onCloseModals()"
					(profileCardToggle)="onProfileCardToggle($event)"
					(userSelectionAdd)="addUserToSelection($event)"
					(userSelectionRemove)="removeUserFromSelection($event)"
					(searchInputChange)="onSearchInputChange()"
					(addNewMember)="addNewMember()">
				</app-chat-members>

				<app-channel-modal
					*ngIf="isAddNewChannel"
					[selectedChannel]="selectedChannel"
					[currentUser]="currentUser"
					[isAddNewChannel]="isAddNewChannel"
					[isNameEdit]="isNameEdit"
					[isDescriptionEdit]="isDescriptionEdit"
					[newChannelName]="newChannelName"
					[newChannelDescription]="newChannelDescription"
					[screenWidth]="screenWidth"
					[otherUserPresence$]="otherUserPresence$"
					(closeModals)="onCloseModals()"
					(toggleNameEdit)="onToggleNameEdit()"
					(toggleDescriptionEdit)="onToggleDescriptionEdit()"
					(leaveChannel)="onLeaveChannel()"
					(openAddMemberModal)="onOpenAddMemberModal()"
					(profileCardToggle)="onProfileCardToggle($event)">
				</app-channel-modal>
			</div>

			<app-new-message-header
				*ngIf="isNewMessage"
				[newMessageInputData]="newMessageInputData"
				(inputDataChange)="onInputDataChange()"
				(keyDown)="onKeyDown($event)">
			</app-new-message-header>
		</header>

		<main
			*ngIf="messages.length >= 1"
			appAutoScroll
			[trigger]="messages"
			class="chat-main"
		>
			@for (message of messages; track trackByMessageId($index, message)) {
				@if (shouldShowDate(messages, $index)) {
					<div class="date-divider">
						<span>{{ message.date }}</span>
					</div>
				}
				<app-chat-message-other
					[message]="message"
					[isThisAThreadMessage]="false">
				</app-chat-message-other>
			}
		</main>

		<!-- Direct Message Empty State -->
		@if (selectedChannel.channelType.directMessage && messages.length === 0) {
			<main class="dm-empty-state">
				<!-- DM Empty State Content hier -->
			</main>
		}

		<footer class="chat-footer">
			<app-message-input-field
				[selectedChannel]="selectedChannel"
				(send)="onSendChatMessage($event)"
				class="message-input-field">
			</app-message-input-field>
		</footer>
	</section>
	
	<div (click)="onCloseModals()" *ngIf="isModalBGOpen" class="modal-bg"></div>
} @else {
	<div class="no-channel-selected">
		<p>Wähle einen Channel aus, um zu chatten</p>
	</div>
}
